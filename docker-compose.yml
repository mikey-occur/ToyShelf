services:
  toyshelf.api:
    image: ${DOCKER_REGISTRY-}toyshelfapi
    build:
      context: .
      dockerfile: ToyShelf.API/Dockerfile
    ports:
      - "${API_PORT}:8080"
    depends_on:
      - postgres
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgrestoyshelf;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    # volumes:
    #   - ./ToyShelf.API/wwwroot:/app/wwwroot
    networks:
      - toyshelfnetwork
    restart: on-failure 

  postgres:
    image: postgres:15
    container_name: postgrestoyshelf
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_EXTERNAL_PORT}:5432"
    volumes:
      - pgvolume:/var/lib/postgresql/data
    networks:
      - toyshelfnetwork
    restart: on-failure

networks:
  toyshelfnetwork:

volumes:
  pgvolume: